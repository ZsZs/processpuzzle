spring:
  application:
    name: processpuzzle-backend
  datasource:
    url: jdbc:h2:mem:processpuzzle;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  h2:
    console:
      enabled: true

logging:
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"

server:
  port: 8080

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
  info:
    env:
      enabled: true

app:
  cors:
    allowed-origins: http://localhost:4200
    allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
    allowed-headers: "*"
    allow-credentials: true

info:
  app:
    name: ${spring.application.name}
    description: ProcessPuzzle Backend Application

springdoc:
  swagger-ui:
    enabled: true
  api-docs:
    path: /api-docs

base-rule:
  loadSamples: yes

minio:
  endpoint: http://localhost:7000
  access-key: minioadmin
  secret-key: minioadmin
  buckets:
    configuration: configuration
    text: text
    images: images
    documents: documents
    audio: audio
    video: video
    archives: archives
    logs: logs

---
spring:
  config:
    activate:
      on-profile: stage | prod

logging:
  pattern:
    console:
  structured:
    format:
      console: logstash
