name: Build-Testbed
on:
  push:
    branches:
      - "feature/**"
    paths:
      - 'apps/processpuzzle-testbed/**'
  pull_request:
    types: [ opened, synchronize, reopened ]
    branches: [ "develop" ]
    paths:
      - 'apps/processpuzzle-testbed/**'
  workflow_run:
    workflows: [ "Build-Auth", "Build-Base-Entity-Frontend", "Build-Util", "Build-Widgets" ]
    types:
      - completed
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      FIREBASE_API_KEY: ${{ secrets.FIREBASE_TOKEN }}
      PIPELINE_STAGE: "ci"
    outputs:
      RUNNER: ${{ runner.name }}
    strategy:
      matrix:
        node-version: [ 24.x ]
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: lint-test-build
        name: Lint test and build the application
        uses: ./.github/actions/lint-test-build
        with:
          base_dir: 'apps/processpuzzle-testbed'
          nx_project: testbed
          github_token: ${{secrets.GITHUB_TOKEN}}
          sonar_token: ${{secrets.SONAR_TOKEN}}
          firebase_token: ${{ secrets.FIREBASE_TOKEN }}

      - id: build-backend
        name: Build backend jar
        run: npx nx run processpuzzle-backend:build --no-cloud

      - id: docker-compose
        name: run-docker-compose
        uses: hoverkraft-tech/compose-action@v2.0.1
        with:
          compose-file: './tools/docker/docker-compose-ci.yaml'

      - id: e2e-test
        name: run-e2e-tests
        uses: ./.github/actions/e2e-test
        with:
          base_dir: 'apps/processpuzzle-testbed-e2e'
          target_environment: 'ci'
