name: Build-Base-Desktop-Backend
on:
  push:
    branches:
      - "feature/**"
      - "develop"
    paths:
      - 'libs/java-shared/base-desktop-backend/**'
  pull_request:
    types: [ opened, synchronize, reopened ]
    branches:
      - "develop"
    paths:
      - 'libs/java-shared/base-desktop-backend/**'
env:
  BASE_DIR: "libs/java-shared/base-desktop-backend"
  NX_PROJECT: "base-desktop-backend"

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONATYPE_TOKEN: ${{ secrets.SONATYPE_TOKEN }}
    outputs:
      RUNNER: ${{ runner.name }}
    strategy:
      matrix:
        node-version: [ 24.x ]
        java-version: [ 25.x ]
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - id: lint-test-build
        name: Lint test and build the application
        uses: ./.github/actions/lint-test-build
        with:
          base_dir: ${{env.BASE_DIR}}
          nx_project: ${{env.NX_PROJECT}}
          github_token: ${{secrets.GITHUB_TOKEN}}
          sonar_token: ${{secrets.SONAR_TOKEN}}
          firebase_token: ${{ secrets.FIREBASE_TOKEN }}
          java-version: ${{ matrix.java-version }}
