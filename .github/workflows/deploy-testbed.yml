name: Deploy-Testbed
on:
  push:
    branches:
      - "develop"
    paths:
      - 'apps/processpuzzle-testbed/**'
      - 'tools/firebase/functions/**'
      - 'tools/mock-backend/db.json'
      - 'firebase.json'

jobs:
  deploy-to-firebase-stage:
    environment: STAGE
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: lint-test-build
        name: Lint test and build the application
        uses: ./.github/actions/lint-test-build
        with:
          base_dir: 'apps/processpuzzle-testbed'
          nx_project: testbed
          github_token: ${{ secrets.GITHUB_TOKEN }}
          sonar_token: ${{ secrets.SONAR_TOKEN }}
          firebase_token: ${{ secrets.FIREBASE_TOKEN }}
          cicd_stage: 'stage'

      - id: build-image
        name: Build and publish Docker images
        uses: ./.github/actions/build-image
        with:
          cicd_stage: 'stage'
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Install Firebase Functions dependencies
        working-directory: tools/firebase/functions
        run: npm install --no-audit --no-fund

      - name: Write Firebase service account key
        id: write-sa
        shell: bash
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          SA_PATH="${RUNNER_TEMP}/firebase-sa.json"
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$SA_PATH"
          echo "path=$SA_PATH" >> "$GITHUB_OUTPUT"

      - name: Deploy Firebase Functions
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.write-sa.outputs.path }}
        run: npx firebase-tools deploy --only functions,firestore:rules,firestore:indexes --project processpuzzle-testbed-stage --non-interactive

      - id: deploy-to-firebase
        name: Deploy to Firebase host
        uses: ./.github/actions/deploy-to-firebase
        with:
          firebase_service_account: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          project_id: processpuzzle-testbed-stage
          channel_id: 'live'
          project_root: .

      - name: Remove Firebase service account key
        if: always()
        shell: bash
        run: rm -f "${{ steps.write-sa.outputs.path }}"

      - id: integration-test
        name: run-integration-tests
        uses: ./.github/actions/e2e-test
        with:
          target_environment: 'stage'
          base_dir: 'apps/processpuzzle-testbed-e2e'
