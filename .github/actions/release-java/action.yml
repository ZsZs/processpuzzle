name: release-java
description: Release Java artifacts to Maven Central
inputs:
  base_dir:
    description: Base director of the source code
    required: true
  nx_project:
    description: Name of the Nx project
    required: true
  github_token:
    description: Token to get access to Github
    required: true
  sonar_token:
    description: Token to get access to SonarCloud
    required: true
  gpg_private_key:
    description: GPG private key for signing artifacts
    required: true
  gpg_passphrase:
    description: GPG passphrase for signing artifacts
    required: true
  central_token_username:
    description: Username for Maven Central token
    required: true
  central_token_password:
    description: Password for Maven Central token
    required: true
  cicd_stage:
    description: Actual stage in the CI/CD pipeline
    required: false
    default: 'ci'
  node-version:
    description: NodeJS version to use
    required: false
    default: '24.x'
  java-version:
    description: Java version to use
    required: false
    default: '25.x'
runs:
  using: composite
  steps:
    - name: Setup Node.js ${{ inputs.node-version }}
      uses: actions/setup-node@v4.4.0
      with:
        node-version: 24
        registry-url: https://registry.npmjs.org
        cache: 'npm'
        cache-dependency-path: |
          package.json
          package-lock.json

    - name: Setup Java
      uses: actions/setup-java@v4.8.0
      with:
        java-version: ${{ inputs.java-version }}
        distribution: 'temurin'
        cache: 'maven'

    - name: Setup Maven 3.9.14
      uses: stCarolas/setup-maven@v5.1
      with:
        maven-version: '3.9.14'

    - name: Config Git
      shell: bash
      run: |
        git config --global user.email "zsolt.zsuffa@gmail.com"
        git config --global user.name "Zsolt Zsuffa"

    - name: Import GPG key
      shell: bash
      run: |
        echo "${{ inputs.gpg_private_key }}" | gpg --batch --import
        gpg --list-secret-keys

    - name: Read POM version
      id: version
      shell: bash
      run: |
        VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
      working-directory: ${{inputs.base_dir}}

    - name: Build in-repo dependencies into local repo
      # Build this module's in-repo upstream dependencies (e.g. processpuzzle-core)
      # from source into ~/.m2 so the deploy below resolves them locally instead of
      # from Maven Central. A freshly-released sibling published via the Central
      # Portal has not necessarily propagated to repo.maven.apache.org yet, which
      # otherwise breaks a downstream release (processpuzzle-store 1.1.0 could not
      # find processpuzzle-core 1.1.0). -am pulls in only upstream deps and is a
      # no-op for libs with no in-repo dependencies (e.g. api-contracts).
      run: mvn --batch-mode -pl ${{ inputs.base_dir }} -am -DskipTests -Dgpg.skip install
      working-directory: ${{ github.workspace }}
      shell: bash

    - name: Publish to Maven Central
      run: mvn --batch-mode --settings ${{ github.workspace }}/settings.xml deploy -Prelease
      working-directory: ${{ inputs.base_dir }}
      env:
        MAVEN_USERNAME: ${{ inputs.central_token_username }}
        MAVEN_PASSWORD: ${{ inputs.central_token_password }}
        GPG_PASSPHRASE: ${{ inputs.gpg_passphrase }}
      shell: bash

    - name: Create GitHub Release
      uses: elgohr/Github-Release-Action@v5
      env:
        GH_TOKEN: ${{ inputs.github_token }}
      with:
        title: "@processpuzzle/${{inputs.nx_project}}/${{steps.version.outputs.VERSION}}"
        tag: "${{inputs.nx_project}}@${{steps.version.outputs.VERSION}}"

    - name: Merge release branch to develop and master
      uses: ./.github/actions/release-merge
      with:
        github_token: ${{ inputs.github_token }}
