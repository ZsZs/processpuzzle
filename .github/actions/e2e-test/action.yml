name: e2e-tests
description: End to End playwright tests
inputs:
  target_environment:
    description: Target environment.
    required: true
    default: ci
  base_dir:
    description: Base directory of Playwright tests
    required: true
  test_scope:
    description: 'full = run all e2e tests; smoke = run only @smoke-tagged tests'
    required: false
    default: full
runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: Install dependencies
      run: npm ci --legacy-peer-deps
      shell: bash

    - name: Install Playwright Browsers
      run: npx playwright install chromium --with-deps
      shell: bash

    - name: Run Playwright tests
      run: |
        if [ "${{ inputs.test_scope }}" = "smoke" ]; then
          npm run e2e-smoke-test-processpuzzle-testbed
        else
          npm run e2e-test-processpuzzle-testbed
        fi
      shell: bash
      env:
        ENVIRONMENT: ${{inputs.target_environment}}

    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report-${{ github.sha }}
        path: ${{inputs.base_dir}}/reports/e2e
        retention-days: 30
