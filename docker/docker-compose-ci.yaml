networks:
  processpuzzle:
    driver: bridge

services:
  processpuzzle-testbed:
    depends_on:
      json-server:
        condition: service_healthy
      firebase:
        condition: service_healthy
    build:
      context: ../
      dockerfile: docker/testbed/Dockerfile
      args:
        CICD_STAGE: ci
    image: zsuffazs/processpuzzle-testbed:latest
    container_name: processpuzzle-testbed
    environment:
      PIPELINE_STAGE: "CI"
      FIREBASE_API_KEY: $FIREBASE_API_KEY
    ports:
      - "9090:80"
    tty: true
    networks:
      - processpuzzle
    healthcheck:
      test: [ "CMD", "curl", "http://localhost:9090/home" ]
      retries: 3
      timeout: 5s
      interval: 20s

  json-server:
    build:
      context: ../
      dockerfile: docker/json-server/Dockerfile
    image: zsuffazs/json-server:latest
    container_name: json-server
    ports:
      - "3000:3000"
    tty: true
    networks:
      - processpuzzle
    healthcheck:
      test: [ "CMD", "curl", "http://localhost:3000/test-entity" ]

  firebase:
    image: zsuffazs/testbed-firebase:latest
    container_name: testbed-firebase
    build:
      context: ../
      dockerfile: docker/firebase/Dockerfile
      args:
        - FIREBASE_VERSION=13.33.0
    stop_grace_period: 1m
    environment:
      FIREBASE_AUTH_EMULATOR_HOST: "localhost:9099"
      FIRESTORE_EMULATOR_HOST: "localhost:8080"
      PUBSUB_EMULATOR_HOST: "localhost:8085"
      FUNCTIONS_EMULATOR_HOST: "localhost:5001"
      FIREBASE_PROJECT: "processpuzzle-testbed-stage"
      GCLOUD_PROJECT: "processpuzzle-testbed-stage"
      FORCE_COLOR: 'true'
      DATA_DIRECTORY: "data"
      CHOKIDAR_USEPOLLING: 'true'
    ports:
      - "4000:4001" # ui
      - "4400:4401" # hub
      - "4600:4601" # logging
      - "5001:5002" # functions
      - "8080:8081" # firestore
      - "8085:8086" # pubsub
      - "9000:9001" # database
      - "9099:9100" # auth
      - "9199:9200" # Storage
      - "6000:6001" # Hosting
    healthcheck:
      test: [ "CMD", "curl", "http://localhost:8080" ]

  keycloak:
    build:
      context: ../
      dockerfile: docker/keycloak/Dockerfile
      args:
        CICD_STAGE: ci
    container_name: testbed-keycloak
    image: zsuffazs/testbed-keycloak:latest
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "7070:8080"
    environment:
      # Database connection
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: password123

      # Admin Credentials (Initial setup only)
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin_password

      # Production settings
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY: "edge"
    networks:
      - processpuzzle
    healthcheck:
      # Keycloak 26+ uses port 9000 for management/health by default
      test: [ "CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000; echo -e 'GET /health/ready HTTP/1.1\r\nhost: localhost\r\nConnection: close\r\n\r\n' >&3; grep -q '200 OK' <&3" ]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    build:
      context: ../
      dockerfile: docker/postgresql/Dockerfile
    image: zsuffazs/testbed-postgres:latest
    container_name: testbed-postgres
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: password123 # Use a secret in production
    networks:
      - processpuzzle
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U keycloak" ]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    build:
      context: ../
      dockerfile: docker/minio/Dockerfile
    image: zsuffazs/testbed-minio:latest
    container_name: testbed-minio
    ports:
      - "7000:9000"             # S3 API
      - "7001:9001"             # Web Console
    environment:
      # Root credentials (admin)
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin

      # Spring Boot service account credentials
      MINIO_SERVICE_USER: springboot
      MINIO_SERVICE_PASSWORD: springboot123
    volumes:
      - minio-data:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:7000/minio/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  minio-data:
    driver: local
  postgres_data:
