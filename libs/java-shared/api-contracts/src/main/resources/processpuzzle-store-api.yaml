openapi: 3.0.3
info:
  title: ProcessPuzzle Store API
  description: API for storing and retrieving binary objects in buckets.
  version: 1.0.0
servers:
  - url: 'http://localhost:8080/api/v1'
paths:
  /objects:
    post:
      summary: Upload binary data with metadata
      operationId: uploadObject
      tags:
        - Object Store
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: The binary file content.
                name:
                  type: string
                  description: The name of the file.
                mimeType:
                  type: string
                  description: The MIME type of the file.
              required:
                - file
                - name
                - mimeType
      responses:
        '201':
          description: File uploaded successfully
          headers:
            Location:
              description: Bucket name / ID of the uploaded file.
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                properties:
                  objectID:
                    type: string
                  fileName:
                    type: string
                  mimeType:
                    type: string
        '400':
          $ref: "#/components/responses/BadRequest"
  /objects/{bucketName}/{objectID}:
    get:
      summary: Retrieve binary data and metadata by ID
      description: Use the object's ID as a path parameter.
      operationId: getObjectByID
      tags:
        - Object Store
      parameters:
        - name: bucketName
          in: path
          required: true
          schema:
            type: string
        - name: objectID
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Binary file and metadata
          headers:
            X-Object-Name:
              description: Name of the file
              schema:
                type: string
            X-Object-Bucket:
              description: Name of the bucket
              schema:
                type: string
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          $ref: "#/components/responses/NotFound"
    delete:
      summary: Delete a stored binary object by ID
      operationId: deleteObjectByID
      tags:
        - Object Store
      parameters:
        - name: bucketName
          in: path
          required: true
          schema:
            type: string
        - name: objectID
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Object deleted successfully
        '404':
          $ref: "#/components/responses/NotFound"
  /objects/{bucketName}/{objectID}/uri:
    get:
      summary: Get signed, short term URI for downloading the object.
      operationId: getObjectUriByID
      tags:
        - Object Store
      parameters:
        - name: bucketName
          in: path
          required: true
          schema:
            type: string
        - name: objectID
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Signed URI for object download.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ObjectUriResponse"
        '404':
          $ref: "#/components/responses/NotFound"
  /objects/{bucketName}/{objectID}/thumbnail-uri:
    get:
      summary: Get signed, short term URI for downloading the object's thumbnail.
      description: Returns a signed MinIO URL for the thumbnail generated at upload time. Returns 404 when no thumbnail exists for the object (non-image types or thumbnail generation disabled at upload).
      operationId: getThumbnailUriByID
      tags:
        - Object Store
      parameters:
        - name: bucketName
          in: path
          required: true
          schema:
            type: string
        - name: objectID
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Signed URI for thumbnail download.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ObjectUriResponse"
        '404':
          $ref: "#/components/responses/NotFound"
components:
  responses:
    BadRequest:
      description: Validation error — the request payload or parameters are invalid.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: The requested resource does not exist.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    Bucket:
      type: object
      properties:
        name:
          type: string
      required:
        - name

    # Shared shape — kept as a local duplicate because the openapi-generator
    # swagger-parser cannot resolve cross-file $refs on Windows. schemaMappings
    # in the pom.xml redirects the generated class to com.processpuzzle.shared.model.
    ErrorResponse:
      type: object
      required: [ errorId, errorText ]
      properties:
        errorId:
          type: string
        errorText:
          type: string

    ObjectUriResponse:
      type: object
      required: [ uri ]
      properties:
        uri:
          type: string
          description: Signed MinIO URL, short-term (typically 1 hour).

