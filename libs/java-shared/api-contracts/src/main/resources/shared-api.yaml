openapi: 3.0.3
info:
  title: ProcessPuzzle Shared API
  description: API parts shared between other services.
  version: 1.0.0
servers:
  - url: 'https://processpuzzle.local'
paths: {}

components:

  parameters:

    WhereParam:
      name: where
      in: query
      required: false
      schema:
        type: string
      description: |
        Filtert Ergebnisse mittels RSQL-Abfragesyntax. Mehrere Bedingungen können
        mit logischen Operatoren kombiniert werden.

        ## Operatoren

        | Operator        | Symbol      | Beispiel                       |
        |-----------------|-------------|--------------------------------|
        | Gleich          | `==`        | `name=="Lenovo"`               |
        | Ungleich        | `!=`        | `name!="Lenovo"`               |
        | Größer als      | `=gt=`      | `price=gt=1000`                |
        | Kleiner als     | `=lt=`      | `price=lt=1000`                |
        | Größer gleich   | `=ge=`      | `price=ge=1000`                |
        | Kleiner gleich  | `=le=`      | `price=le=1000`                |
        | IN-Liste        | `=in=`      | `vendor=in=(IBM,Dell,HP)`      |
        | NICHT IN-Liste  | `=out=`     | `vendor=out=(IBM,Dell)`        |
        | Platzhalter     | `==*wert*`  | `name=="*enovo*"`              |

        ## Logische Operatoren

        | Operator | Symbol | Beispiel                                    |
        |----------|--------|---------------------------------------------|
        | UND      | `;`    | `name=="Lenovo";status=="active"`           |
        | ODER     | `,`    | `name=="Lenovo",name=="Dell"`               |

        ## Platzhalter

        Mit `*` können Zeichenketten teilweise verglichen werden:
          - `name=="Lenovo*"` — beginnt mit
          - `name=="*enovo"` — endet mit
          - `name=="*enov*"` — enthält

    OrderParam:
      name: order
      in: query
      required: false
      schema:
        type: string
      description: |
        Bestimmt die Sortierung der Ergebnisse.

        Format: `property,(asc|desc)`. Mehrere Sortierkriterien können durch Komma getrennt angegeben werden.
        Beispiel: `name,asc` oder `name,asc,id,desc`.

    PageParam:
      name: page
      in: query
      required: false
      schema:
        type: integer
        default: 0
      description: Zero-based page index for paged list endpoints.

    SizeParam:
      name: size
      in: query
      required: false
      schema:
        type: integer
        default: 20
      description: Number of elements per page for paged list endpoints.

  responses:

    BadRequest:
      description: Validation error — the request payload or parameters are invalid.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    NotFound:
      description: The requested resource does not exist.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    Conflict:
      description: The request conflicts with the current state of the resource.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:

    ErrorResponse:
      type: object
      required: [ errorId, errorText ]
      description: >-
        Standard error payload returned by all ProcessPuzzle services. `errorId` is a
        stable, machine-readable identifier that clients can key on (also usable as a
        Transloco translation key on the frontend). `errorText` is the human-readable
        fallback message in the service's default language.
      properties:
        errorId:
          type: string
          description: Stable, machine-readable error identifier / translation key.
          example: rule.import.duplicate-id
        errorText:
          type: string
          description: Human-readable error message in the service's default language.
          example: A rule with this id already exists.

    ImportResult:
      type: object
      description: Outcome of a bulk YAML import operation.
      properties:
        created:
          type: integer
          description: Number of new records created by the import.
        updated:
          type: integer
          description: Number of existing records updated by the import.
        errors:
          type: array
          description: Validation errors that caused the import to be rejected.
          items:
            type: string
