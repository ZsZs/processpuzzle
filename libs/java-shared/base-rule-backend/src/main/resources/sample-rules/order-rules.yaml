rules:
  - id: positive-quantities
    name: All line item quantities are positive
    context: Order
    severity: ERROR
    enabled: true
    fields:
      - lineItems
    expression: "!entity.lineItems || entity.lineItems.every(li => Number(li.quantity) > 0)"
    message: All line item quantities must be greater than zero.
    translocoId: rule.order.positiveQuantities

  - id: total-matches-line-items
    name: Total matches sum of line items
    context: Order
    severity: ERROR
    enabled: true
    fields:
      - total
      - lineItems
    expression: >-
      !entity.lineItems ||
      Math.abs(Number(entity.total) - entity.lineItems.reduce((sum, li) => sum + Number(li.unitPrice)
      * Number(li.quantity), 0)) < 0.001
    message: Order total does not match the sum of line item subtotals.
    translocoId: rule.order.totalMatchesLineItems

  - id: shipped-requires-address
    name: Shipped orders require a shipping address
    description: >-
      Conditional rule — PPCL's "implies" (condition implies consequence) translates to
      JS as !condition || consequence. An empty string counts as missing.
    context: Order
    severity: WARNING
    enabled: true
    fields:
      - shippingAddress
      - status
    expression: "entity.status !== 'SHIPPED' || (entity.shippingAddress != null && entity.shippingAddress !== '')"
    message: A shipped order is missing its shipping address.
    translocoId: rule.order.shippedRequiresAddress

  - id: special-order-allows-zero-quantity
    name: Special orders may include zero-quantity placeholder items
    description: >-
      Overrides 'positive-quantities' for the SpecialOrder context — demonstrates the
      extends/override convention for relaxing a constraint inherited from a base rule.
    context: SpecialOrder
    extends: positive-quantities
    override: true
    severity: ERROR
    enabled: true
    fields:
      - lineItems
    expression: "!entity.lineItems || entity.lineItems.every(li => Number(li.quantity) >= 0)"
    message: Special order line items must have a non-negative quantity.
    translocoId: rule.specialOrder.allowsZeroQuantity
