<mat-toolbar *ngIf="formNavigator.activeRouteSegment() === RouteSegments.LIST_ROUTE">
  <div class="dense-3" [ngStyle]="{'padding-top': '12px' }">
    <mat-form-field>
      <input #filterInput test-id="filter-input" matInput type="text" (keyup)="onDoFilter( $event )" placeholder="Filter">
      @if (filterInput.value) {
        <button test-id="clear-filter" type="button" mat-icon-button matSuffix aria-label="Clear filter" (click)="onClearFilter(filterInput)">
          <mat-icon>cancel</mat-icon>
        </button>
      }
    </mat-form-field>
  </div>
  <span class="toolbar-spacer"></span>
  @if(isSmallDevice()) {
    <div [ngClass]="layoutService.layoutClass()">
      <button test-id="menu-button" mat-button [matMenuTriggerFor]="beforeMenu"><mat-icon>menu</mat-icon> Choose action</button>
      <mat-menu test-id="menu" #beforeMenu="matMenu" xPosition="before">
        <button test-id="add" [attr.data-testid]="entityDescriptor().entityName + '-new'" mat-menu-item (click)="onAddEntity()"><mat-icon>add</mat-icon> New</button>
        <button test-id="delete" [attr.data-testid]="entityDescriptor().entityName + '-delete'" mat-menu-item [disabled]="store.selectedEntities().length === 0" (click)="onDeleteEntities()"><mat-icon>delete</mat-icon> Delete</button>
      </mat-menu>
    </div>
  } @else {
    <div [ngClass]="layoutService.layoutClass()">
      <button test-id="add" [attr.data-testid]="entityDescriptor().entityName + '-new'" mat-button (click)="onAddEntity()"><mat-icon>add</mat-icon> New</button>
      <button test-id="delete" [attr.data-testid]="entityDescriptor().entityName + '-delete'" mat-button [disabled]="store.selectedEntities().length === 0" (click)="onDeleteEntities()"><mat-icon>delete</mat-icon> Delete</button>
    </div>
  }
</mat-toolbar>
