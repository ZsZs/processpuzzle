# Project
sonar.host.url=https://sonarcloud.io
sonar.projectKey=processpuzzle_auth
sonar.projectName=processpuzzle_auth
sonar.organization=processpuzzle
sonar.sourceEncoding=UTF-8
sonar.sources=domain, feature
sonar.tests=domain, feature
sonar.exclusions=public-api.ts, feature/public-api.ts, feature/public-api.ts, test-setup.ts, src/**/*.module.ts
sonar.test.inclusions=domain/**/*.spec.ts, feature/**/*.spec.ts
sonar.coverage.exclusions=**/*.mapper.ts, **/*.service.ts, **/*.store.ts
sonar.eslint.reportPaths=reports/eslint/eslint.json
sonar.javascript.lcov.reportPaths=reports/coverage/lcov.info
